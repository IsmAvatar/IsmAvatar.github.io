<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OCR Code Capture</title>

<style>
:root {
    color-scheme: light;
}

body {
    font-family: Arial, sans-serif;
    margin: 10px;
    max-width: 720px;
}

h2 {
    margin: 0 0 10px;
}

#cameraPanel {
    display: grid;
    gap: 10px;
}

#preview,
#snapshot {
    width: 100%;
    max-width: 520px;
    background: #111;
    border: 1px solid #bbb;
}

#preview {
    aspect-ratio: 4 / 3;
    object-fit: cover;
}

#snapshot {
    display: none;
}

button {
    font-size: 16px;
    padding: 8px 12px;
    margin: 3px 3px 3px 0;
}

button:disabled {
    opacity: 0.55;
}

#status {
    min-height: 24px;
    font-size: 16px;
    font-weight: bold;
}

#buildInfo {
    color: #555;
    font-size: 12px;
}

#count {
    font-size: 22px;
    font-weight: bold;
    margin: 12px 0 6px;
}

#list {
    margin-top: 8px;
    max-width: 520px;
}

.row {
    padding: 5px 4px;
    border-bottom: 1px solid #ddd;
    font-family: Consolas, monospace;
    font-size: 18px;
    word-break: break-all;
}

#rawText {
    width: 100%;
    max-width: 520px;
    min-height: 130px;
    box-sizing: border-box;
    font-family: Consolas, monospace;
    font-size: 14px;
}

#canvas {
    display: none;
}
</style>
</head>
<body>

<h2>OCR Code Capture</h2>

<div id="cameraPanel">
    <video id="preview" autoplay playsinline muted></video>
    <img id="snapshot" alt="Captured frame preview">
    <div>
        <button id="startBtn">Start Camera</button>
        <button id="captureBtn">Capture</button>
        <button id="refocusBtn" disabled>Refocus</button>
        <button id="copyBtn" disabled>Copy Codes</button>
    </div>
    <div id="status">Starting camera...</div>
    <div id="buildInfo">Build: camera-nonblocking-start-2</div>
</div>

<div id="count">Codes: 0</div>
<div id="list"></div>

<h3>Raw OCR</h3>
<textarea id="rawText" readonly></textarea>

<canvas id="canvas"></canvas>

<script>
const codePattern = /H1\d+/g;
const video = document.getElementById("preview");
const snapshot = document.getElementById("snapshot");
const canvas = document.getElementById("canvas");
const startBtn = document.getElementById("startBtn");
const captureBtn = document.getElementById("captureBtn");
const refocusBtn = document.getElementById("refocusBtn");
const copyBtn = document.getElementById("copyBtn");
const statusEl = document.getElementById("status");
const countEl = document.getElementById("count");
const listEl = document.getElementById("list");
const rawTextEl = document.getElementById("rawText");

// Stream currently feeding the camera preview.
let cameraStream = null;

// Prevents overlapping camera permission/start requests.
let cameraStarting = false;

// Tesseract is loaded only after capture so it cannot block camera startup.
let tesseractLoadPromise = null;

// Tesseract worker is expensive to start, so it is created lazily and reused.
let ocrWorker = null;

// Codes extracted from the most recent captured image.
let extractedCodes = [];

async function startCamera() {
    if (cameraStarting || cameraStream) return;

    cameraStarting = true;
    startBtn.disabled = true;
    statusEl.textContent = "Starting camera...";

    try {
        if (!navigator.mediaDevices?.getUserMedia) {
            throw new Error("Camera API is unavailable on this page");
        }

        cameraStream = await getCameraStream();
        video.srcObject = cameraStream;

        statusEl.textContent = "Camera stream connected";
        startBtn.disabled = true;
        captureBtn.disabled = false;
        refocusBtn.disabled = false;

        video.play().catch(() => null);
        applyCameraPreferencesWithTimeout();
    } catch (err) {
        statusEl.textContent = "Camera error: " + err.message;
        startBtn.disabled = false;
        captureBtn.disabled = true;
        refocusBtn.disabled = true;
    } finally {
        cameraStarting = false;
    }
}

async function getCameraStream() {
    const streamRequest = navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" },
        audio: false
    });

    const timeout = new Promise((_, reject) => {
        setTimeout(() => reject(new Error("Camera request timed out")), 12000);
    });

    return Promise.race([streamRequest, timeout]);
}

function applyCameraPreferencesWithTimeout() {
    const preferences = applyCameraPreferences();
    const timeout = new Promise(resolve => setTimeout(resolve, 2500));

    Promise.race([preferences, timeout]).finally(() => {
        if (cameraStream) statusEl.textContent = "Camera ready";
    });
}

async function applyCameraPreferences() {
    const track = cameraStream?.getVideoTracks()[0];
    if (!track?.applyConstraints) return;

    await track.applyConstraints({
        width: { ideal: 1920 },
        height: { ideal: 1080 }
    });

    await applyBestFocus();
}

async function applyBestFocus() {
    const track = cameraStream?.getVideoTracks()[0];
    if (!track?.getCapabilities || !track.applyConstraints) return null;

    const capabilities = track.getCapabilities();
    const focusModes = capabilities.focusMode || [];
    const focusMode = focusModes.includes("continuous")
        ? "continuous"
        : focusModes.includes("single-shot")
            ? "single-shot"
            : null;

    if (!focusMode) return null;

    await track.applyConstraints({
        advanced: [{ focusMode }]
    });

    return focusMode;
}

async function refocusCamera() {
    refocusBtn.disabled = true;
    const originalStatus = statusEl.textContent;

    try {
        statusEl.textContent = "Refocusing...";
        const focusMode = await applyBestFocus();
        statusEl.textContent = focusMode ? "Camera ready" : "Focus control unavailable";
    } catch (err) {
        statusEl.textContent = "Focus error: " + err.message;
    } finally {
        refocusBtn.disabled = false;
        if (statusEl.textContent === "Focus control unavailable") {
            setTimeout(() => {
                statusEl.textContent = originalStatus;
            }, 1500);
        }
    }
}

async function loadTesseract() {
    if (window.Tesseract) return window.Tesseract;

    if (!tesseractLoadPromise) {
        statusEl.textContent = "Loading OCR library...";
        tesseractLoadPromise = new Promise((resolve, reject) => {
            const script = document.createElement("script");
            script.src = "https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
            script.onload = () => resolve(window.Tesseract);
            script.onerror = () => reject(new Error("Could not load OCR library"));
            document.head.appendChild(script);
        });
    }

    return tesseractLoadPromise;
}

async function getOcrWorker() {
    if (ocrWorker) return ocrWorker;

    const Tesseract = await loadTesseract();
    statusEl.textContent = "Loading OCR...";
    ocrWorker = await Tesseract.createWorker("eng", 1, {
        logger: message => {
            if (message.status === "recognizing text") {
                const percent = Math.round(message.progress * 100);
                statusEl.textContent = "Reading text... " + percent + "%";
            }
        }
    });

    await ocrWorker.setParameters({
        tessedit_char_whitelist: "H0123456789",
        tessedit_pageseg_mode: Tesseract.PSM?.SPARSE_TEXT || "11"
    });

    return ocrWorker;
}

function drawVideoFrameToCanvas() {
    const sourceWidth = video.videoWidth;
    const sourceHeight = video.videoHeight;

    if (!sourceWidth || !sourceHeight) {
        throw new Error("Camera frame is not ready yet");
    }

    const maxWidth = 1800;
    const scale = Math.min(1, maxWidth / sourceWidth);
    canvas.width = Math.round(sourceWidth * scale);
    canvas.height = Math.round(sourceHeight * scale);

    const ctx = canvas.getContext("2d", { willReadFrequently: true });
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    improveTextContrast(ctx, canvas.width, canvas.height);
    snapshot.src = canvas.toDataURL("image/png");
    snapshot.style.display = "block";
}

function improveTextContrast(ctx, width, height) {
    const image = ctx.getImageData(0, 0, width, height);
    const data = image.data;

    for (let i = 0; i < data.length; i += 4) {
        const gray = data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
        const boosted = gray < 170 ? Math.max(0, gray - 35) : Math.min(255, gray + 35);
        data[i] = boosted;
        data[i + 1] = boosted;
        data[i + 2] = boosted;
    }

    ctx.putImageData(image, 0, 0);
}

function extractCodes(text) {
    const found = new Set();
    const lines = text.toUpperCase().split(/\r?\n/);

    for (const line of lines) {
        const compactLine = line
            .replace(/[|I]/g, "1")
            .replace(/O/g, "0")
            .replace(/[^A-Z0-9]/g, "");

        for (const code of compactLine.match(codePattern) || []) {
            found.add(code);
        }
    }

    return Array.from(found).sort((a, b) =>
        a.localeCompare(b, undefined, { numeric: true })
    );
}

function updateCodeList(codes) {
    extractedCodes = codes;
    countEl.textContent = "Codes: " + codes.length;
    copyBtn.disabled = codes.length === 0;
    listEl.innerHTML = "";

    for (const code of codes) {
        const row = document.createElement("div");
        row.className = "row";
        row.textContent = code;
        listEl.appendChild(row);
    }
}

async function captureAndRead() {
    captureBtn.disabled = true;
    copyBtn.disabled = true;
    statusEl.textContent = "Capturing...";

    try {
        drawVideoFrameToCanvas();
        const worker = await getOcrWorker();
        const result = await worker.recognize(canvas);
        const rawText = result.data.text || "";
        const codes = extractCodes(rawText);

        rawTextEl.value = rawText;
        updateCodeList(codes);
        statusEl.textContent = codes.length ? "Done" : "No H1 codes found";
    } catch (err) {
        statusEl.textContent = "OCR error: " + err.message;
    } finally {
        captureBtn.disabled = false;
    }
}

captureBtn.disabled = true;
refocusBtn.disabled = true;
startBtn.addEventListener("click", startCamera);
captureBtn.addEventListener("click", captureAndRead);
refocusBtn.addEventListener("click", refocusCamera);
video.addEventListener("click", refocusCamera);
copyBtn.addEventListener("click", () => {
    navigator.clipboard.writeText(extractedCodes.join("\n"));
});

startCamera();
</script>

</body>
</html>
