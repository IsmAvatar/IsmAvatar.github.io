<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Barcode Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 10px;
}

#reader {
    width: 100%;
    max-width: 500px;
}

button {
    font-size: 18px;
    padding: 10px;
    margin: 5px;
}

#count {
    font-size: 22px;
    font-weight: bold;
    margin: 10px 0;
}

#results {
    width: 100%;
    height: 300px;
    font-size: 16px;
}
</style>
</head>
<body>

<h2>Barcode Scanner</h2>

<div id="count">Count: 0</div>

<div id="reader"></div>

<div>
    <button onclick="copyList()">Copy List</button>
    <button onclick="clearList()">Clear List</button>
</div>

<textarea id="results" readonly></textarea>

<script>
const codes = new Set();

function updateDisplay() {
    const list = Array.from(codes);
    document.getElementById("results").value = list.join("\n");
    document.getElementById("count").textContent =
        "Count: " + list.length;
}

function addCode(code) {
    if (codes.has(code)) return;

    codes.add(code);
    updateDisplay();

    if (navigator.vibrate) {
        navigator.vibrate(100);
    }
}

function copyList() {
    navigator.clipboard.writeText(
        document.getElementById("results").value
    );
    alert("Copied");
}

function clearList() {
    if (!confirm("Clear all scanned barcodes?")) return;

    codes.clear();
    updateDisplay();
}

const scanner = new Html5Qrcode("reader");

Html5Qrcode.getCameras()
.then(devices => {
    if (!devices.length) {
        alert("No camera found");
        return;
    }

    scanner.start(
        { facingMode: "environment" },
        {
            fps: 10,
            qrbox: { width: 300, height: 150 },
            formatsToSupport: [
                Html5QrcodeSupportedFormats.UPC_A,
                Html5QrcodeSupportedFormats.UPC_E,
                Html5QrcodeSupportedFormats.EAN_13,
                Html5QrcodeSupportedFormats.EAN_8,
                Html5QrcodeSupportedFormats.CODE_128,
                Html5QrcodeSupportedFormats.CODE_39
            ]
        },
        decodedText => addCode(decodedText),
        errorMessage => {}
    );
})
.catch(err => {
    alert("Camera error: " + err);
});
</script>

</body>
</html>
