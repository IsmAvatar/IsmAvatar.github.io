<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Barcode Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 10px;
}

#reader {
    width: 220px;
    max-width: 220px;
    margin-bottom: 10px;
}

#lastScanPanel {
    border: 1px solid #ccc;
    padding: 8px;
    margin: 10px 0;
    font-size: 16px;
}

button {
    font-size: 16px;
    padding: 8px;
    margin: 3px;
}

#count {
    font-size: 22px;
    font-weight: bold;
    margin: 10px 0;
}

#list {
    margin-top: 10px;
}

.row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px;
    border-bottom: 1px solid #ddd;
}

.latest {
    background-color: #b7ffb7;
}

.previous {
    background-color: #ffffb0;
}

.code {
    flex-grow: 1;
    word-break: break-all;
}

.deleteBtn {
    margin-left: 10px;
}
</style>
</head>
<body>

<h2>Barcode Scanner</h2>

<div id="count">Count: 0</div>

<div id="reader"></div></div>
    
<div id="lastScanPanel">
    <div><b>Last Scan:</b> <span id="lastCode">None</span></div>
    <div><b>Type:</b> <span id="lastType">Unknown</span></div>
    <div><b>Time:</b> <span id="lastTime">--</span></div>
</div>

<div>
    <button onclick="copyList()">Copy List</button>
    <button onclick="clearList()">Clear List</button>
</div>
    
<div id="list"></div>
<textarea id="results" readonly></textarea>

<script>
const codes = new Set();

let latestCode = null;
let previousCode = null;
let lastScanCode = "";
let lastScanType = "";
let lastScanTime = "";
//pick the most frequent scan among the noise
const candidates = new Map();

function updateDisplay() {
    const sorted = Array.from(codes).sort((a, b) =>
        a.localeCompare(b, undefined, { numeric: true })
    );

    document.getElementById("count").textContent =
        "Count: " + sorted.length;

    const container = document.getElementById("list");
    container.innerHTML = "";

    for (const code of sorted) {
        const row = document.createElement("div");
        row.className = "row";

        if (code === latestCode) {
            row.classList.add("latest");
        } else if (code === previousCode) {
            row.classList.add("previous");
        }

        const text = document.createElement("div");
        text.className = "code";
        text.textContent = code;

        const del = document.createElement("button");
        del.className = "deleteBtn";
        del.textContent = "Delete";

        del.onclick = () => {
            codes.delete(code);

            if (latestCode === code) latestCode = null;
            if (previousCode === code) previousCode = null;

            updateDisplay();
        };

        row.appendChild(text);
        row.appendChild(del);

        container.appendChild(row);
    }
}

function handleScan(code, type) {
    const key = `${type}|${code}`;

    const entry = candidates.get(key) || {
        hits: 0,
        lastSeen: Date.now()
    };

    entry.hits++;
    entry.lastSeen = Date.now();

    candidates.set(key, entry);

    if (entry.hits >= 3) {
        candidates.clear();
        addCode(code, type);
    }
}

function addCode(code, type) {

    if (codes.has(code)) return;

    previousCode = latestCode;
    latestCode = code;

    lastScanCode = code;
    lastScanType = type;

    lastScanTime = new Date().toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
    });

    codes.add(code);

    updateLastScanPanel();
    updateDisplay();

    if (navigator.vibrate) {
        navigator.vibrate(100);
    }
}

function copyList() {
    const sorted = Array.from(codes).sort((a, b) =>
        a.localeCompare(b, undefined, { numeric: true })
    );

    navigator.clipboard.writeText(sorted.join("\n"));
}

function clearList() {
    if (!confirm("Clear all scanned barcodes?")) return;

    codes.clear();
    latestCode = null;
    previousCode = null;

    updateDisplay();
}

function updateLastScanPanel() {
    document.getElementById("lastCode").textContent =
        lastScanCode || "None";

    document.getElementById("lastType").textContent =
        lastScanType || "Unknown";

    document.getElementById("lastTime").textContent =
        lastScanTime || "--";
}

const scanner = new Html5Qrcode("reader");

Html5Qrcode.getCameras()
.then(devices => {
    if (!devices.length) {
        alert("No camera found");
        return;
    }

    scanner.start(
        { facingMode: "environment" },
        {
            fps: 10,
            qrbox: { width: 300, height: 150 },
            formatsToSupport: [
                Html5QrcodeSupportedFormats.UPC_A,
                Html5QrcodeSupportedFormats.UPC_E,
                Html5QrcodeSupportedFormats.EAN_13,
                Html5QrcodeSupportedFormats.EAN_8,
                Html5QrcodeSupportedFormats.CODE_128,
                Html5QrcodeSupportedFormats.CODE_39
            ]
        },
        (decodedText, decodedResult) => {
           let type = "Unknown";
           try {
                type = decodedResult.result.format.formatName;
           } catch (e) {
                console.log(decodedResult);
           }
           handleScan(decodedText, type);
        },
        errorMessage => {}
    );
})
.catch(err => {
    alert("Camera error: " + err);
});
</script>

</body>
</html>
